name: "Deploy Vercel"

on:
  push:
    paths-ignore:
      - "README.md"
      - "docker"
      - "docs"
      - "tests"
      - ".cursorignore"
      - ".npmrc"
      - ".gitignore"
      - "CHANGELOG.md"
      - ".claude"
      - "CLAUDE.md"
      - "GETTING-STARTED.md"
      - "LICENSE"
      - "github-metrics.svg"
      - "cliff.toml"
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout code"
        uses: "actions/checkout@v7.0.0"

      - name: "Setup pnpm"
        uses: pnpm/action-setup@v6.0.2
        with:
          version: 11.6.0

      - name: "Setup node.js"
        uses: "actions/setup-node@v6.4.0"
        with:
          node-version: "24.11.0"
          cache: 'pnpm'  

      - name: "Setup Python"
        uses: "actions/setup-python@v6.3.0"
        with:
          python-version: "3.14.6"

      - name: "prepare vercel cli"
        run: npm install -g vercel@latest

      - name: "Cache OG data"
        uses: actions/cache@v6.1.0
        id: cache-og
        with:
          path: .cache/og-data.json
          key: og-data-${{ hashFiles('src/content/**/*.md', 'src/content/**/*.mdx') }}
          restore-keys: |
            og-data-

      - name: "Install dependency"
        run: pnpm install --no-frozen-lockfile
        
      - name: "build page"
        run: vercel build
        
      - name: "deploy build"
        run: vercel deploy --prod --prebuilt
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_PROJECT_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
